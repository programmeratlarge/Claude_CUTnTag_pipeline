# MultiQC config for CUT&Tag DSL2 pipeline
title: "CUT&Tag analysis report"
intro_text: >
  Integrated QC and analysis report for paired-end CUT&Tag data,
  spanning raw reads, adapter trimming, alignment, filtering,
  duplicate removal, peak calling, group merging, FRiP, and TSS enrichment.

report_comment: >
  Generated by the cuttag-dsl2 Nextflow pipeline.

extra_fn_clean_exts:
    - ".sorted"
    - ".filtered"
    - ".dedup"
    - ".trim"
    - ".raw"
    - ".aligned"

# Search paths — MultiQC scans the work-directory passed to it
fn_clean_sample_names: true

# Module ordering — most informative first
top_modules:
    - "fastqc"
    - "cutadapt"
    - "bowtie2"
    - "samtools"
    - "picard"
    - "umi_tools"
    - "deeptools"
    - "macs3"

# Custom-content files: sections produced by the pipeline
custom_data:
    read_retention:
        section_name: "Read retention through pipeline"
        description: "Reads remaining after each filtering step (per sample)."
        plot_type: "bargraph"
    frip_scores:
        section_name: "FRiP scores"
        description: "Fraction of reads in peaks (per-sample and per-group)."
        plot_type: "bargraph"
    peak_annotation:
        section_name: "Peak annotation"
        description: "Genomic feature distribution of called peaks."
        plot_type: "bargraph"

# Visual tweaks
table_columns_visible:
    FastQC:
        percent_duplicates: true
        percent_gc: true
        avg_sequence_length: true
        total_sequences: true
    Bowtie 2:
        overall_alignment_rate: true
    Samtools Flagstat:
        flagstat_total: true
        mapped_passed_pct: true
    Picard:
        PERCENT_DUPLICATION: true

export_plots: true
